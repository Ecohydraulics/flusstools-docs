# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2
build:
  os: "ubuntu-22.04"
  tools:
    python: "3.11"
  jobs:
    # Install flusstools itself WITHOUT its dependencies: the package now declares
    # gdal (and the rest of the geospatial stack) as runtime deps, none of which we
    # want RTD to build. autodoc only needs the importable source - every heavy
    # import is mocked in docs/conf.py (autodoc_mock_imports).
    post_install:
      - pip install --no-deps "flusstools>=2.0.0"

# Build documentation in the docs/ directory with Sphinx
sphinx:
  builder: html
  configuration: docs/conf.py
  fail_on_warning: false

# Build documentation with MkDocs
#mkdocs:
#  configuration: mkdocs.yml

# Optionally build your docs in additional formats such as PDF
formats:
  - epub
  - pdf

# Install the Sphinx tooling. flusstools itself is installed --no-deps in the
# build.jobs.post_install step above (so RTD never builds GDAL); autodoc imports
# it with the heavy dependencies mocked in docs/conf.py (autodoc_mock_imports).
python:
  install:
    - requirements: requirements.txt

# Server Side Search settings
search:
   ranking:
     # match all files in the root directory
     /*: -5
   ignore:
     - 404.html
     # ignore all files in the docs/ directory
     - docs/*
